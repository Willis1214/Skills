interface:
  display_name: "Brainstorm"
  short_description: "Round-loop requirement, QC, risk, Red Team, and Front Taste workflow"
  default_prompt: "Use $brainstorm to run repeated discussion rounds in the fixed role-based format; every round covers requirement clarification, story and flow mapping, structured confirmation, QC and acceptance thinking, and risk attack without prescribing the implementation path. When the package is ready, run the local Red Team skill, run the local Front Taste skill when visual quality matters, then output PRD Markdown, user-story-map HTML, and QC checklist Markdown."
